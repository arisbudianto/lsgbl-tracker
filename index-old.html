<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Tracker — LS-GBL Framework | UNS 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8f7f4;color:#1a1a18;font-size:14px;line-height:1.5}
a{color:inherit;text-decoration:none}
.container{max-width:860px;margin:0 auto;padding:24px 16px}
/* Header */
.site-header{background:#fff;border-bottom:1px solid #e5e3dc;padding:14px 0;position:sticky;top:0;z-index:100}
.site-header .inner{max-width:860px;margin:0 auto;padding:0 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.site-title{font-size:15px;font-weight:500}
.site-sub{font-size:11px;color:#888;margin-top:1px}
/* Badges */
.badge{display:inline-block;padding:2px 9px;border-radius:4px;font-size:11px;font-weight:500}
.bp{background:#EEEDFE;color:#3C3489}.bt{background:#E1F5EE;color:#0F6E56}
.ba{background:#FAEEDA;color:#854F0B}.bb{background:#E6F1FB;color:#185FA5}
.bgr{background:#F1EFE8;color:#5F5E5A}.bc{background:#FAECE7;color:#993C1D}
.bpi{background:#FBEAF0;color:#993556}.bg{background:#EAF3DE;color:#3B6D11}
/* Stats */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:20px 0}
.stat{background:#fff;border:1px solid #e5e3dc;border-radius:10px;padding:12px 14px}
.stat-lbl{font-size:11px;color:#888;margin-bottom:4px}
.stat-val{font-size:22px;font-weight:500}
/* Progress */
.prog-wrap{margin-bottom:16px}
.prog-label{display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:5px}
.prog-track{height:8px;background:#e5e3dc;border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:#534AB7;border-radius:4px;transition:width .4s}
/* Filter bar */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filter-bar span{font-size:12px;color:#888}
.btn{padding:6px 12px;border-radius:8px;border:1px solid #d5d3cc;background:#fff;color:#1a1a18;font-size:12px;cursor:pointer;transition:background .15s}
.btn:hover{background:#f1efe8}
.btn-pri{background:#534AB7;color:#fff;border-color:#534AB7}
.btn-pri:hover{background:#3C3489}
.btn-active{background:#f1efe8;font-weight:500}
.btn-danger{color:#a32d2d;border-color:#f09595}
.btn-danger:hover{background:#fcebeb}
/* Phase card */
.phase-card{background:#fff;border:1px solid #e5e3dc;border-radius:12px;margin-bottom:12px;overflow:hidden}
.phase-head{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#faf9f6;border-bottom:1px solid #e5e3dc;cursor:pointer;user-select:none;flex-wrap:wrap}
.phase-head:hover{background:#f1efe8}
.phase-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0}
.phase-title{font-size:14px;font-weight:500;flex:1;min-width:160px}
.phase-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-left:auto}
.phase-prog-txt{font-size:12px;color:#888}
.mini-prog{width:60px;height:4px;background:#e5e3dc;border-radius:2px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:4px}
.mini-fill{height:100%;border-radius:2px;transition:width .3s}
.tkt-badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:500;background:#FAEEDA;color:#633806}
.toggle-icon{font-size:11px;color:#888;flex-shrink:0}
/* Phase body */
.phase-body{display:none}
.phase-body.open{display:block}
.section-divider{font-size:11px;font-weight:500;color:#888;padding:6px 16px;background:#faf9f6;border-bottom:1px solid #e5e3dc;letter-spacing:.03em;text-transform:uppercase}
/* Task row */
.task-row{display:grid;grid-template-columns:30px 1fr auto;align-items:flex-start;gap:10px;padding:12px 16px;border-bottom:1px solid #e5e3dc;transition:background .1s}
.task-row:last-child{border-bottom:none}
.task-row:hover{background:#faf9f6}
.task-row.done .task-title{text-decoration:line-through;color:#aaa}
.task-row.done .task-target{color:#bbb}
/* Checkbox */
.cb{width:18px;height:18px;border:1.5px solid #ccc;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;background:#fff;margin-top:1px}
.cb:hover{border-color:#7F77DD}
.cb.checked{background:#534AB7;border-color:#534AB7}
.cb.checked::after{content:'';display:block;width:5px;height:9px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px)}
/* Task content */
.task-title{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:3px}
.task-target{font-size:12px;color:#666;line-height:1.4;margin-bottom:5px}
.task-people{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px}
.task-output{font-size:11px;color:#888;font-style:italic;line-height:1.4}
.task-date{font-size:11px;color:#888;background:#f1efe8;border-radius:4px;padding:2px 8px;white-space:nowrap;align-self:flex-start;margin-top:1px}
/* Avatar */
.avatar{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:9px;font-weight:500}
.av-a{background:#FAEEDA;color:#633806}.av-t{background:#E1F5EE;color:#085041}
.av-p{background:#EEEDFE;color:#3C3489}.av-b{background:#E6F1FB;color:#0C447C}
.av-c{background:#FAECE7;color:#712B13}.av-g{background:#EAF3DE;color:#27500A}
.av-pi{background:#FBEAF0;color:#72243E}.av-am{background:#FAEEDA;color:#412402}
/* Empty */
.empty-msg{padding:24px;text-align:center;color:#888;font-size:13px}
/* Footer */
footer{text-align:center;font-size:11px;color:#aaa;padding:24px 0 16px;border-top:1px solid #e5e3dc;margin-top:24px}
/* Responsive */
@media(max-width:500px){
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .task-row{grid-template-columns:28px 1fr}
  .task-date{display:none}
}
</style>
</head>

</div>

let filter='all';
let openPhases=new Set(['f1']);

function loadState(){try{const s=localStorage.getItem('lsgbl_tracker_v2');if(s){const d=JSON.parse(s);PHASES.forEach(ph=>ph.tasks.forEach(t=>{if(d[t.id]!==undefined)t.done=d[t.id]}))}}catch(e){}}
function saveState(){try{const d={};PHASES.forEach(ph=>ph.tasks.forEach(t=>d[t.id]=t.done));localStorage.setItem('lsgbl_tracker_v2',JSON.stringify(d))}catch(e){}}

function toggle(id){const t=PHASES.flatMap(p=>p.tasks).find(x=>x.id===id);if(!t)return;t.done=!t.done;saveState();updateStats();renderTask(t);}
function togglePhase(id){if(openPhases.has(id))openPhases.delete(id);else openPhases.add(id);const b=document.getElementById('body-'+id);const ic=document.getElementById('icon-'+id);if(b)b.classList.toggle('open',openPhases.has(id));if(ic)ic.textContent=openPhases.has(id)?'▲':'▼';}
function expandAll(){PHASES.forEach(p=>{openPhases.add(p.id);const b=document.getElementById('body-'+p.id);const ic=document.getElementById('icon-'+p.id);if(b)b.classList.add('open');if(ic)ic.textContent='▲';});}
function collapseAll(){PHASES.forEach(p=>{openPhases.delete(p.id);const b=document.getElementById('body-'+p.id);const ic=document.getElementById('icon-'+p.id);if(b)b.classList.remove('open');if(ic)ic.textContent='▼';});}
function setFilter(f){filter=f;['all','todo','done'].forEach(x=>{const el=document.getElementById('f-'+x);if(el)el.classList.toggle('btn-active',x===f)});render();}
function resetAll(){if(!confirm('Reset semua checklist ke belum selesai?'))return;PHASES.forEach(ph=>ph.tasks.forEach(t=>t.done=false));saveState();updateStats();render();}

function updateStats(){
  let total=0,done=0;
  PHASES.forEach(ph=>ph.tasks.forEach(t=>{total++;if(t.done)done++;}));
  const todo=total-done,pct=total>0?Math.round(done/total*100):0;
  document.getElementById('st-total').textContent=total;
  document.getElementById('st-done').textContent=done;
  document.getElementById('st-todo').textContent=todo;
  document.getElementById('st-pct').textContent=pct+'%';
  document.getElementById('main-prog').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('b-total').textContent=total+' tugas';
  document.getElementById('b-done').textContent=done+' selesai';
  document.getElementById('b-todo').textContent=todo+' belum';
  PHASES.forEach(ph=>{
    const pt=ph.tasks.length,pd=ph.tasks.filter(t=>t.done).length,pp=pt>0?Math.round(pd/pt*100):0;
    const mf=document.getElementById('mf-'+ph.id),pptxt=document.getElementById('pp-'+ph.id);
    if(mf)mf.style.width=pp+'%';if(pptxt)pptxt.textContent=pd+'/'+pt;
  });
}

function renderTask(t){const el=document.getElementById('task-'+t.id);if(!el)return;el.className='task-row'+(t.done?' done':'');const cb=el.querySelector('.cb');if(cb)cb.className='cb'+(t.done?' checked':'');}

function peopleHtml(ppl){return ppl.map(p=>`<span class="avatar ${p.cls}" title="${p.name}">${p.init}</span>`).join('');}

function render(){
  let html='';
  PHASES.forEach(ph=>{
    const filtered=filter==='all'?ph.tasks:filter==='done'?ph.tasks.filter(t=>t.done):ph.tasks.filter(t=>!t.done);
    if(filtered.length===0&&filter!=='all')return;
    const pt=ph.tasks.length,pd=ph.tasks.filter(t=>t.done).length,pp=pt>0?Math.round(pd/pt*100):0;
    const isOpen=openPhases.has(ph.id);
    let secs={};filtered.forEach(t=>{if(!secs[t.section])secs[t.section]=[];secs[t.section].push(t);});
    let body='';
    Object.entries(secs).forEach(([sec,tasks])=>{
      body+=`<div class="section-divider">${sec}</div>`;
      tasks.forEach(t=>{
        body+=`<div class="task-row${t.done?' done':''}" id="task-${t.id}">
          <div><div class="cb${t.done?' checked':''}" onclick="toggle('${t.id}')"></div></div>
          <div>
            <div class="task-title">${t.title}</div>
            <div class="task-target">${t.target}</div>
            <div class="task-people">${peopleHtml(t.people)}</div>
            <div class="task-output">Output: ${t.output}</div>
          </div>
          <div class="task-date">${t.date}</div>
        </div>`;
      });
    });
    html+=`<div class="phase-card" id="phase-${ph.id}">
      <div class="phase-head" onclick="togglePhase('${ph.id}')">
        <div class="phase-num" style="background:${ph.numBg};color:${ph.numColor}">${ph.num}</div>
        <div class="phase-title">${ph.title}</div>
        <div class="phase-meta">
          <span class="badge ${ph.colorClass}">${ph.period}</span>
          <span class="tkt-badge">${ph.tkt}</span>
          <span class="phase-prog-txt" id="pp-${ph.id}">${pd}/${pt}</span>
          <div class="mini-prog"><div class="mini-fill" id="mf-${ph.id}" style="width:${pp}%;background:${ph.miniFill}"></div></div>
          <span class="toggle-icon" id="icon-${ph.id}">${isOpen?'▲':'▼'}</span>
        </div>
      </div>
      <div class="phase-body${isOpen?' open':''}" id="body-${ph.id}">${body}</div>
    </div>`;
  });
  if(!html)html='<div class="empty-msg">Tidak ada tugas yang sesuai filter.</div>';
  document.getElementById('phases-container').innerHTML=html;
  updateStats();
}

loadState();render();updateStats();
</script>
</body>
</html>
